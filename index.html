<script>
        // CONFIGURAÇÃO ATUALIZADA COM O SEU NOVO BANCO (RANKING-GOLS)
        const firebaseConfig = {
            apiKey: "AIzaSyCMivYBxCSnu2HvS6wD7aWJOuK7z9f7G40",
            authDomain: "ranking-gols.firebaseapp.com",
            databaseURL: "https://ranking-gols-default-rtdb.firebaseio.com",
            projectId: "ranking-gols",
            storageBucket: "ranking-gols.firebasestorage.app",
            messagingSenderId: "866441770590",
            appId: "1:866441770590:web:7cb5aab9a22aa2782466cf",
            measurementId: "G-N0HSRYLP3G"
        };
        
        // Inicialização padrão do Firebase v8
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();
        let dadosUsuarioLogado = null;
        let rivalAleatorioSelecionado = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                database.ref('/usuarios/' + user.uid).once('value').then(snapshot => {
                    dadosUsuarioLogado = snapshot.val();
                    if(!dadosUsuarioLogado) {
                        // Correção: Adicionado o campo "celular" padrão para evitar erros no agendamento automático
                        dadosUsuarioLogado = {
                            responsavel: user.email.split('@')[0],
                            nomeTime: "Time Temporário",
                            urlEscudo: "https://via.placeholder.com/250?text=TIME",
                            anoFundacao: "2026",
                            sobreTime: "Criado automaticamente.",
                            celular: "(00) 00000-0000",
                            uid: user.uid
                        };
                        database.ref('/usuarios/' + user.uid).set(dadosUsuarioLogado);
                    }

                    document.getElementById('userNome').innerText = dadosUsuarioLogado.responsavel;
                    document.getElementById('userTime').innerText = dadosUsuarioLogado.nomeTime;
                    mostrarAba('Agendamento');
                    carregarTimesCadastrados();

                }).catch(err => {
                    alert("Erro ao acessar o Banco: " + err.message);
                    mostrarAba('Login');
                });
            } else { 
                mostrarAba('Login');
            }
        });

        function mostrarAba(aba) {
            document.getElementById('secaoLogin').style.display = aba === 'Login' ? 'block' : 'none';
            document.getElementById('secaoCadastro').style.display = aba === 'Cadastro' ? 'block' : 'none';
            document.getElementById('secaoAgendamento').style.display = aba === 'Agendamento' ? 'block' : 'none';
            document.getElementById('modalConfirmacao').style.display = 'none';
        }

        function mudarSubAba(subAba) {
            document.getElementById('subAbaAgendar').style.display = subAba === 'agendar' ? 'block' : 'none';
            document.getElementById('subAbaTimes').style.display = subAba === 'times' ? 'block' : 'none';
            
            document.getElementById('btnAbaAgendar').classList.toggle('ativa', subAba === 'agendar');
            document.getElementById('btnAbaTimes').classList.toggle('ativa', subAba === 'times');
            if(subAba === 'times') {
                carregarTimesCadastrados();
            }
        }

        let listaGlobalTimes = {};
        function carregarTimesCadastrados() {
            const container = document.getElementById('listaTimesCadastrados');
            container.innerHTML = `<p style="text-align:center; color:#c5c6c7;">Carregando equipes...</p>`;
            
            database.ref('/usuarios').once('value').then(snapshot => {
                container.innerHTML = ""; 
                listaGlobalTimes = {};
                
                if(!snapshot.exists()) {
                    container.innerHTML = `<p style="text-align:center; color:#a5a6a7;">Nenhum time registrado até o momento.</p>`;
                    return;
                }

                snapshot.forEach(childSnapshot => {
                    const timeData = childSnapshot.val();
                    const key = childSnapshot.key;
                    
                    if (timeData.nomeTime) {
                        listaGlobalTimes[key] = timeData;
                        const cardHtml = `
                            <div class="card-time-lista" onclick="verDetalhesTime('${key}')">
                                <img src="${timeData.urlEscudo || 'https://via.placeholder.com/250?text=TIME'}" class="escudo-lista-time" onerror="this.src='https://via.placeholder.com/250?text=⚽'">
                                <div class="info-lista-time">
                                    <h4>${timeData.nomeTime}</h4>
                                    <p>📅 <strong>Fundação:</strong> ${timeData.anoFundacao || 'Não Informada'}</p>
                                    <p>👤 <strong>Resp:</strong> ${timeData.responsavel || 'Desconhecido'}</p>
                                    <p style="font-style: italic; color:#85929E; margin-top:4px; font-size:0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 320px;">
                                        "${timeData.sobreTime || 'Sem descrição.'}"
                                    </p>
                                </div>
                            </div>
                        `;
                        container.innerHTML += cardHtml;
                    }
                });
            }).catch(err => {
                container.innerHTML = `<p style="text-align:center; color:#ff2222;">Erro ao carregar dados: ${err.message}</p>`;
            });
        }

        function verDetalhesTime(key) {
            const time = listaGlobalTimes[key];
            if(!time) return;

            document.getElementById('detalheEscudo').src = time.urlEscudo || 'https://via.placeholder.com/250?text=TIME';
            document.getElementById('detalheNome').innerText = time.nomeTime;
            document.getElementById('detalheAno').innerText = time.anoFundacao || 'Não informado';
            document.getElementById('detalheResp').innerText = time.responsavel || 'Desconhecido';
            document.getElementById('detalheSobre').innerText = time.sobreTime || 'Sem descrição cadastrada.';
            
            const numCelular = time.celular ? time.celular.replace(/\D/g, '') : '';
            document.getElementById('detalheWhats').href = `https://wa.me/55${numCelular}?text=Olá,%20vi%20seu%20time%20no%20Arena%20Olho%20no%20Lance!%20Bora%20marcar%20um%20jogo?`;
            document.getElementById('detalhesTimeSelecionado').style.display = 'block';
            document.getElementById('detalhesTimeSelecionado').scrollIntoView({ behavior: 'smooth' });
        }

        function atualizarOpcoesRival() {
            if(document.querySelector('input[name="financeiro"]:checked').value === "Rachar") {
                document.querySelector('input[name="tipoRival"][value="Procurar"]').checked = true;
                atualizarAbasRival();
            }
        }

        function atualizarAbasRival() {
            const tipoRival = document.querySelector('input[name="tipoRival"]:checked').value;
            if(document.querySelector('input[name="financeiro"]:checked').value === "Rachar" && tipoRival === "Conhecido") {
                alert("Para rachar o valor pelo site, selecione 'Procurar adversário no site'.");
                document.querySelector('input[name="tipoRival"][value="Procurar"]').checked = true;
                document.getElementById('campoRivalFixo').style.display = 'none';
                document.getElementById('campoRivalAleatorio').style.display = 'block';
                return;
            }
            
            if (tipoRival === 'Conhecido') {
                document.getElementById('campoRivalFixo').style.display = 'block';
                document.getElementById('campoRivalAleatorio').style.display = 'none';
                rivalAleatorioSelecionado = null;
            } else {
                // Correção: Ajustado o erro de sintaxe do .style.style.display
                document.getElementById('campoRivalFixo').style.display = 'none';
                document.getElementById('campoRivalAleatorio').style.display = 'block';
            }
        }

        function buscarRivalAleatorio() {
            database.ref('/usuarios').once('value').then(snapshot => {
                let timesDisponiveis = [];
                
                snapshot.forEach(child => {
                    const t = child.val();
                    if (t.nomeTime && t.uid !== dadosUsuarioLogado.uid) {
                        timesDisponiveis.push(t);
                    }
                });

                if (timesDisponiveis.length === 0) {
                    alert("Ainda não há outros times cadastrados no sistema para buscar de forma aleatória.");
                    return;
                }

                const indiceSorteado = Math.floor(Math.random() * timesDisponiveis.length);
                rivalAleatorioSelecionado = timesDisponiveis[indiceSorteado];
                alert(`🎯 Rival Encontrado com Sucesso: ${rivalAleatorioSelecionado.nomeTime}! Agora escolha o dia/horário e clique em Finalizar Pedido.`);
            }).catch(err => alert("Erro ao sortear rival: " + err.message));
        }

        function cadastrar() {
            const email = document.getElementById('cadEmail').value.trim();
            const BlackPass = document.getElementById('cadSenha').value;
            const nome = document.getElementById('cadNome').value.trim(); 
            const celular = document.getElementById('cadCelular').value.trim();
            const time = document.getElementById('cadTime').value.trim(); 
            const escudoInput = document.getElementById('cadEscudo');
            const ano = document.getElementById('cadAno').value.trim(); 
            const sobre = document.getElementById('cadSobre').value.trim();
            
            if(!email || !BlackPass || !nome || !celular || !time || !ano || !sobre) {
                return alert("Por favor, preencha todos os campos obrigatórios!");
            }

            const salvarUsuarioComEscudo = (escudoBase64) => {
                auth.createUserWithEmailAndPassword(email, BlackPass).then(cred => {
                    return database.ref('/usuarios/' + cred.user.uid).set({ 
                        responsavel: nome, celular: celular, nomeTime: time, 
                        urlEscudo: escudoBase64, 
                        anoFundacao: ano, sobreTime: sobre, uid: cred.user.uid
                    });
                }).then(() => {
                    alert("Conta e time criados com sucesso!");
                    carregarTimesCadastrados();
                }).catch(err => alert("Erro no cadastro: " + err.message));
            };

            if (escudoInput.files && escudoInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    salvarUsuarioComEscudo(e.target.result);
                };
                reader.readAsDataURL(escudoInput.files[0]);
            } else {
                salvarUsuarioComEscudo("https://via.placeholder.com/250?text=TIME");
            }
        }

        function logar() { 
            const email = document.getElementById('loginEmail').value.trim();
            const senha = document.getElementById('loginSenha').value;
            if(!email || !senha) return alert("Por favor, informe o e-mail e a senha!");
            auth.signInWithEmailAndPassword(email, senha).catch(err => {
                alert("Erro ao fazer login: " + err.message);
            });
        }

        function deslogar() { 
            auth.signOut().then(() => { mostrarAba('Login'); });
        }

        function processarAgendamento() {
            const data = document.getElementById('dataJogo').value;
            const horario = document.getElementById('horarioJogo').value;
            const financeiro = document.querySelector('input[name="financeiro"]:checked').value;
            const tipoRival = document.querySelector('input[name="tipoRival"]:checked').value;
            if (!data || !horario) return alert("Escolha o dia e o horário!");
            document.getElementById('areaContatoRival').style.display = 'none';

            if (tipoRival === "Conhecido") {
                const rivalNome = document.getElementById('rivalNome').value || "Adversário";
                const rivalEscudo = "https://via.placeholder.com/250?text=RIVAL";
                salvarNoFirebase(data, horario, dadosUsuarioLogado.nomeTime, dadosUsuarioLogado.urlEscudo, rivalNome, rivalEscudo, "Pendente", financeiro, dadosUsuarioLogado, null);
            } 
            else if (tipoRival === "Procurar" && rivalAleatorioSelecionado) {
                salvarNoFirebase(data, horario, dadosUsuarioLogado.nomeTime, dadosUsuarioLogado.urlEscudo, rivalAleatorioSelecionado.nomeTime, rivalAleatorioSelecionado.urlEscudo, "Pendente", financeiro, dadosUsuarioLogado, null);
                document.getElementById('modalTitulo').innerText = "💥 CONFRONTO AGENDADO COM RIVAL!";
                document.getElementById('modalTexto').innerText = "Confronto direto criado! Veja abaixo a ficha técnica do seu oponente:";
                document.getElementById('rivalPerfilEscudo').src = rivalAleatorioSelecionado.urlEscudo || "https://via.placeholder.com/250?text=RIVAL";
                document.getElementById('rivalPerfilTime').innerText = rivalAleatorioSelecionado.nomeTime;
                document.getElementById('rivalPerfilAno').innerText = rivalAleatorioSelecionado.anoFundacao || "Não Informado";
                document.getElementById('rivalPerfilSobre').innerText = rivalAleatorioSelecionado.sobreTime || "Sem descrição.";
                document.getElementById('rivalRespNome').innerText = rivalAleatorioSelecionado.responsavel;
                document.getElementById('rivalRespCelular').innerText = rivalAleatorioSelecionado.celular || "Não Informado";
                document.getElementById('areaContatoRival').style.display = 'block';
            } 
            else {
                database.ref('/agendamentos').orderByChild('data').equalTo(data).once('value').then(snapshot => {
                    let matchID = null; let matchJogo = null;
        
                    snapshot.forEach(child => {
                        const jogo = child.val();
                        if (jogo.horario === horario && jogo.status === "Aguardando Rival" && jogo.modoFinanceiro === financeiro && jogo.nomeCasa !== dadosUsuarioLogado.nomeTime) {
                            matchID = child.key; matchJogo = child.val();
                        }
                    });

                    if (matchJogo) {
                        database.ref('/agendamentos/' + matchID).update({
                            nomeVisitante: dadosUsuarioLogado.nomeTime,
                            urlEscudoVisitante: dadosUsuarioLogado.urlEscudo,
                            responsavelVisitante: dadosUsuarioLogado.responsavel,
                            celularVisitante: dadosUsuarioLogado.celular,
                            uidVisitante: dadosUsuarioLogado.uid,
                            status: "Pendente" 
                        }).then(() => {
                            document.getElementById('modalTitulo').innerText = "💥 CONFRONTO ENCONTRADO!";
                            document.getElementById('modalTexto').innerText = "Jogo casado! Analise o perfil do seu adversário abaixo, combine os uniformes e chame a quadra para liberar!";
                            document.getElementById('rivalPerfilEscudo').src = matchJogo.escudoCasaPerfil || matchJogo.urlEscudoCasa;
                            document.getElementById('rivalPerfilTime').innerText = matchJogo.nomeCasa;
                            document.getElementById('rivalPerfilAno').innerText = matchJogo.anoCasaPerfil || "Não Informado";
                            document.getElementById('rivalPerfilSobre').innerText = matchJogo.sobreCasaPerfil || "Sem descrição.";
                            document.getElementById('rivalRespNome').innerText = matchJogo.responsavelCasa;
                            document.getElementById('rivalRespCelular').innerText = matchJogo.celularCasa;
                            
                            document.getElementById('areaContatoRival').style.display = 'block';
                            document.getElementById('modalConfirmacao').style.display = 'block';
                        });
                    } else {
                        salvarNoFirebase(data, horario, dadosUsuarioLogado.nomeTime, dadosUsuarioLogado.urlEscudo, "Procurando...", "https://via.placeholder.com/250?text=?", "Aguardando Rival", financeiro, dadosUsuarioLogado, true);
                    }
                });
            }
        }

        function salvarNoFirebase(data, horario, casa, escudoCasa, visitante, escudoVisitante, status, financeiro, donoDados, colocarFila) {
            const jogoData = {
                data: data, horario: horario,
                nomeCasa: casa, urlEscudoCasa: escudoCasa,
                nomeVisitante: visitante, urlEscudoVisitante: escudoVisitante,
                responsavelCasa: donoDados.responsavel, celularCasa: donoDados.celular,
                uidCasa: donoDados.uid,
                anoCasaPerfil: donoDados.anoFundacao || "",
                sobreCasaPerfil: donoDados.sobreTime || "",
                escudoCasaPerfil: donoDados.urlEscudo || "",
                status: status, modoFinanceiro: financeiro
            };
            database.ref('/agendamentos').push().set(jogoData).then(() => {
                if (status === "Pendente" && !colocarFila) {
                    document.getElementById('modalConfirmacao').style.display = 'block';
                } else {
                    document.getElementById('modalTitulo').innerText = "Pedido Enviado!";
                    if (colocarFila) {
                        document.getElementById('modalTexto').innerText = "Você está na lista de espera. O seu perfil de time foi publicado neste horário. Quando um rival aceitar, ele verá seus dados!";
                    } else {
                        document.getElementById('modalTexto').innerText = "Agendamento pré-registrado. Clique abaixo para mandar mensagem para a administração!";
                    }
                    document.getElementById('modalConfirmacao').style.display = 'block';
                }
                rivalAleatorioSelecionado = null;
            });
        }
    </script>
