<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Artilheiro da Temporada | Olho no Lance</title>
    
    <!-- Firebase SDKs (v8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <!-- Bibliotecas de Design -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #2ecc71;
            --dark: #0b0c10;
            --accent: #bfff00;
            --glass: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0; font-family: 'Rajdhani', sans-serif;
            background-color: var(--dark); color: #fff;
            background-image: radial-gradient(circle at top, #1f402b 0%, #0b0c10 100%);
            background-attachment: fixed; min-height: 100vh;
        }

        /* HEADER STADIUM */
        header {
            text-align: center; padding: 40px 20px;
            border-bottom: 4px solid var(--accent);
            background: rgba(0,0,0,0.6);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        header h1 { 
            font-family: 'Orbitron', sans-serif; font-size: 2.2rem; 
            margin: 0; color: var(--accent); text-transform: uppercase;
        }
        header p { margin: 5px 0 0; opacity: 0.8; letter-spacing: 2px; font-weight: bold; }

        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        /* AREA PRIVADA BUTTON */
        .admin-trigger {
            position: absolute; top: 15px; right: 15px; background: var(--glass);
            border: 1px solid var(--accent); color: var(--accent);
            padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold;
            font-size: 0.7rem; z-index: 100;
        }

        /* RANKING LIST */
        .ranking-list { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .player-card {
            display: flex; align-items: center; background: var(--glass);
            padding: 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer; transition: 0.3s;
        }
        .player-card:hover { transform: scale(1.02); background: rgba(255,255,255,0.12); border-color: var(--accent); }
        
        .pos { width: 45px; font-family: 'Orbitron'; font-size: 1.5rem; color: var(--accent); text-align: center; }
        .photo-frame { width: 60px; height: 60px; border-radius: 50%; border: 2.5px solid var(--primary); overflow: hidden; margin: 0 15px; background: #222; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        .info { flex: 1; }
        .info h3 { margin: 0; font-size: 1.2rem; text-transform: uppercase; }
        .info p { margin: 0; opacity: 0.6; font-size: 0.85rem; }
        
        .goals-count { 
            text-align: center; padding: 8px 15px; background: var(--primary); 
            color: #000; border-radius: 10px; font-family: 'Orbitron'; min-width: 70px;
        }
        .goals-count span { display: block; font-size: 0.6rem; font-weight: bold; }

        /* PAINEL ADMIN */
        .admin-panel { display: none; background: #fff; color: #333; border-radius: 20px; padding: 25px; margin-top: 20px; }
        .form-box { background: #f8f9fa; padding: 20px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #ddd; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; }

        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; text-transform: uppercase; }
        .btn-add { background: var(--primary); color: #fff; width: 100%; }
        .btn-sm { padding: 5px 10px; font-size: 0.75rem; }
        .btn-plus { background: var(--primary); color: white; }
        .btn-minus { background: #95a5a6; color: white; }
        .btn-del { background: #e74c3c; color: white; }
        .btn-vid { background: #3498db; color: white; }

        .admin-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        .admin-table th, .admin-table td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
        .admin-table img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--dark); padding: 30px; border-radius: 20px; border: 2px solid var(--accent); width: 100%; max-width: 450px; text-align: center; }
        .video-link { display: block; background: var(--glass); padding: 12px; margin: 10px 0; border-radius: 10px; color: var(--accent); text-decoration: none; border: 1px solid rgba(255,255,255,0.1); font-weight: bold; }

        @media (max-width: 600px) {
            header h1 { font-size: 1.5rem; }
            .admin-table th:nth-child(2), .admin-table td:nth-child(2) { display: none; }
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <button class="admin-trigger" onclick="acessoAdmin()">ÁREA PRIVADA</button>

    <header>
        <h1>Artilheiro da Temporada</h1>
        <p>OFERECIMENTO: OLHO NO LANCE</p>
    </header>

    <div class="container">
        <!-- RANKING PÚBLICO -->
        <div id="viewCliente">
            <div class="ranking-list" id="rankingList">
                <p style="text-align: center; opacity: 0.5;">Carregando ranking...</p>
            </div>
        </div>

        <!-- PAINEL ADMIN -->
        <div id="viewAdmin" class="admin-panel">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:15px;">
                <h2 style="margin:0">Painel de Controle</h2>
                <button class="btn btn-del btn-sm" onclick="location.reload()">Sair</button>
            </div>

            <div class="form-box">
                <div class="form-group">
                    <label>Nome do Jogador</label>
                    <input type="text" id="addNome" placeholder="Ex: Pelé">
                </div>
                <div class="form-group">
                    <label>Equipe</label>
                    <input type="text" id="addEquipe" placeholder="Ex: Santos">
                </div>
                <div class="form-group">
                    <label>Foto do Atleta</label>
                    <input type="file" id="addFoto" accept="image/*">
                </div>
                <button class="btn btn-add" onclick="cadastrarJogador()">ADICIONAR AO RANKING</button>
            </div>

            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Foto</th>
                        <th>Nome</th>
                        <th>Gols</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- MODAL VÍDEOS -->
    <div id="modalGols" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="color: var(--accent); margin-top:0;">Gols do Atleta</h2>
            <div id="linksContainer"></div>
            <button class="btn btn-del" style="margin-top:20px; width:100%" onclick="fecharModal()">Fechar</button>
        </div>
    </div>

    <script>
        // 1. CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            databaseURL: "https://ranking-gols-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. SINCRONIZAÇÃO EM TEMPO REAL
        db.ref('jogadores').on('value', snap => {
            const data = snap.val();
            const lista = [];
            for (let id in data) { lista.push({ id, ...data[id] }); }
            lista.sort((a, b) => b.gols - a.gols);
            renderizarCliente(lista);
            renderizarAdmin(lista);
        });

        // 3. FUNÇÃO CADASTRAR (COM MOTOR ANTI-TRAVAMENTO)
        async function cadastrarJogador() {
            const nome = document.getElementById('addNome').value.trim();
            const equipe = document.getElementById('addEquipe').value.trim();
            const fotoFile = document.getElementById('addFoto').files[0];

            if(!nome || !equipe) return Swal.fire('Erro', 'Nome e Equipe obrigatórios', 'error');

            Swal.fire({ title: 'Salvando no Banco...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                let fotoFinal = "https://via.placeholder.com/150?text=Sem+Foto";
                if (fotoFile) {
                    fotoFinal = await comprimirImagem(fotoFile);
                }

                await db.ref('jogadores').push({
                    nome, equipe, foto: fotoFinal, gols: 0, links: []
                });

                Swal.fire({ icon: 'success', title: 'Sucesso!', timer: 1500, showConfirmButton: false });
                document.getElementById('addNome').value = '';
                document.getElementById('addEquipe').value = '';
                document.getElementById('addFoto').value = '';
            } catch (e) {
                Swal.fire('Erro', e.message, 'error');
            }
        }

        // 4. COMPRESSOR DE IMAGEM (CANVAS)
        function comprimirImagem(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = 200; 
                        canvas.height = 200;
                        ctx.drawImage(img, 0, 0, 200, 200);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                    img.onerror = () => reject(new Error("Erro ao processar imagem"));
                };
                reader.onerror = () => reject(new Error("Erro ao ler arquivo"));
            });
        }

        // 5. RENDERIZADORES
        function renderizarCliente(lista) {
            const container = document.getElementById('rankingList');
            container.innerHTML = lista.length ? '' : '<p style="text-align:center;opacity:0.5">Nenhum jogador ainda.</p>';
            lista.forEach((j, i) => {
                const card = document.createElement('div');
                card.className = 'player-card';
                card.onclick = () => abrirVideos(j.nome, j.links);
                card.innerHTML = `
                    <div class="pos">${i + 1}º</div>
                    <div class="photo-frame"><img src="${j.foto}"></div>
                    <div class="info"><h3>${j.nome}</h3><p>${j.equipe}</p></div>
                    <div class="goals-count">${j.gols}<span>GOLS</span></div>
                `;
                container.appendChild(card);
            });
        }

        function renderizarAdmin(lista) {
            const tbody = document.getElementById('adminTableBody');
            if(!tbody) return;
            tbody.innerHTML = '';
            lista.forEach(j => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><img src="${j.foto}"></td>
                    <td><strong>${j.nome}</strong></td>
                    <td>
                        <button class="btn btn-plus btn-sm" onclick="ajustarGol('${j.id}', 1)">+</button>
                        <b style="margin:0 5px">${j.gols}</b>
                        <button class="btn btn-minus btn-sm" onclick="ajustarGol('${j.id}', -1)">-</button>
                    </td>
                    <td>
                        <button class="btn btn-vid btn-sm" onclick="addLink('${j.id}')"><i class="fas fa-video"></i></button>
                        <button class="btn btn-del btn-sm" onclick="excluir('${j.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 6. AÇÕES DO BANCO
        function ajustarGol(id, val) {
            db.ref('jogadores/' + id + '/gols').transaction(c => (c || 0) + val);
        }

        function excluir(id) {
            Swal.fire({ title: 'Excluir?', icon: 'warning', showCancelButton: true }).then(r => {
                if(r.isConfirmed) db.ref('jogadores/' + id).remove();
            });
        }

        function addLink(id) {
            Swal.fire({ title: 'Link do vídeo', input: 'url', showCancelButton: true }).then(r => {
                if(r.value) {
                    const ref = db.ref('jogadores/' + id + '/links');
                    ref.once('value', s => {
                        const links = s.val() || [];
                        links.push(r.value);
                        ref.set(links);
                        Swal.fire('Salvo!', '', 'success');
                    });
                }
            });
        }

        // 7. INTERFACE MODAL E LOGIN
        function abrirVideos(nome, links) {
            document.getElementById('modalTitle').innerText = "Gols de " + nome;
            const cont = document.getElementById('linksContainer');
            cont.innerHTML = '';
            if(!links || links.length === 0) cont.innerHTML = '<p style="opacity:0.5">Nenhum vídeo ainda.</p>';
            else links.forEach((l, i) => cont.innerHTML += `<a href="${l}" target="_blank" class="video-link">Assistir Gol #${i+1}</a>`);
            document.getElementById('modalGols').style.display = 'flex';
        }

        function fecharModal() { document.getElementById('modalGols').style.display = 'none'; }

        function acessoAdmin() {
            Swal.fire({
                title: 'Área Restrita',
                html: `<input type="text" id="u" class="swal2-input" placeholder="Usuário"><input type="password" id="p" class="swal2-input" placeholder="Senha">`,
                preConfirm: () => {
                    if(document.getElementById('u').value === 'admin' && document.getElementById('p').value === '123456') return true;
                    Swal.showValidationMessage('Acesso negado');
                }
            }).then(r => {
                if(r.isConfirmed) {
                    document.getElementById('viewCliente').classList.add('hidden');
                    document.getElementById('viewAdmin').style.display = 'block';
                }
            });
        }

        // Fechar modal ao clicar fora
        window.onclick = (e) => { if (e.target == document.getElementById('modalGols')) fecharModal(); }
    </script>
</body>
</html>
