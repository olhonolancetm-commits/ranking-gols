<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artilheiro da Temporada | Olho no Lance</title>
    
    <!-- SDKs do Firebase (v8 - Estável) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <!-- Design e Ícones -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #2ecc71;
            --primary-dark: #1b3d1b;
            --stadium-bg: #0b0c10;
            --accent: #bfff00;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.08);
            --danger: #e74c3c;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; font-family: 'Rajdhani', sans-serif;
            background-color: var(--stadium-bg); color: var(--white);
            background-image: radial-gradient(circle at top, #1f402b 0%, #0b0c10 100%);
            background-attachment: fixed;
            min-height: 100vh; padding-bottom: 50px;
        }

        header {
            text-align: center; padding: 50px 20px;
            border-bottom: 4px solid var(--accent);
            background: rgba(0,0,0,0.6);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        header h1 { 
            font-family: 'Orbitron', sans-serif; font-size: 2.8rem; 
            margin: 0; color: var(--accent); text-transform: uppercase;
            text-shadow: 0 0 15px rgba(191, 255, 0, 0.6);
        }

        header p { margin: 10px 0 0; opacity: 0.9; letter-spacing: 3px; font-weight: bold; }

        .container { max-width: 850px; margin: 0 auto; padding: 20px; }

        /* BOTÃO ÁREA PRIVADA */
        .admin-trigger {
            position: absolute; top: 15px; right: 15px; background: var(--glass);
            border: 1px solid var(--accent); color: var(--accent);
            padding: 8px 18px; border-radius: 30px; cursor: pointer; font-weight: bold;
            transition: 0.3s; font-size: 0.8rem; z-index: 999;
        }
        .admin-trigger:hover { background: var(--accent); color: #000; }

        /* LISTA DE RANKING (CLIENTE) */
        .ranking-list { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        
        .player-card {
            display: flex; align-items: center; background: var(--glass);
            padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer; transition: 0.4s; backdrop-filter: blur(10px);
        }
        
        .player-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.15); border-color: var(--accent); }
        
        .pos { width: 60px; font-family: 'Orbitron'; font-size: 1.8rem; color: var(--accent); text-align: center; }
        .photo-frame { width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--primary); overflow: hidden; margin: 0 20px; background: #111; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        .info { flex: 1; }
        .info h3 { margin: 0; font-size: 1.5rem; text-transform: uppercase; color: #fff; }
        .info p { margin: 2px 0 0; opacity: 0.7; font-size: 1rem; color: var(--primary); font-weight: bold; }
        
        .goals-count { 
            text-align: center; padding: 12px; background: var(--primary); 
            color: #000; border-radius: 15px; font-family: 'Orbitron'; min-width: 85px;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
        }
        .goals-count span { display: block; font-size: 0.7rem; font-weight: 900; margin-top: -5px; }

        /* PAINEL ADMIN */
        .admin-panel { display: none; background: #fff; color: #333; border-radius: 25px; padding: 30px; margin-top: 30px; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .form-box { background: #f4f7f6; padding: 25px; border-radius: 20px; margin-bottom: 30px; border: 1px solid #ddd; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-family: inherit; font-size: 1rem; }
        .form-group input:focus { border-color: var(--primary); outline: none; }

        .btn { padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; font-weight: 800; transition: 0.3s; font-family: 'Rajdhani'; text-transform: uppercase; }
        .btn-add { background: var(--primary); color: #fff; width: 100%; font-size: 1.2rem; margin-top: 10px; }
        .btn-add:hover { background: #27ae60; }
        .btn-sm { padding: 6px 12px; font-size: 0.85rem; margin: 2px; }
        .btn-plus { background: var(--primary); color: white; }
        .btn-minus { background: #95a5a6; color: white; }
        .btn-del { background: var(--danger); color: white; }
        .btn-link { background: #3498db; color: white; }

        .admin-table { width: 100%; border-collapse: collapse; }
        .admin-table th { text-align: left; padding: 15px; background: #eee; font-size: 0.8rem; text-transform: uppercase; }
        .admin-table td { padding: 15px; border-bottom: 1px solid #eee; }
        .admin-table img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #ddd; }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--stadium-bg); padding: 40px; border-radius: 30px; border: 2px solid var(--accent); width: 100%; max-width: 500px; position: relative; text-align: center; }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 2rem; cursor: pointer; color: #666; }
        .close-modal:hover { color: #fff; }
        
        .video-link { 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: var(--glass); padding: 15px; margin: 12px 0; 
            border-radius: 15px; color: var(--accent); text-decoration: none; border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s; font-weight: bold;
        }
        .video-link:hover { background: var(--accent); color: #000; transform: scale(1.03); }

        /* RESPONSIVIDADE */
        @media (max-width: 600px) {
            header h1 { font-size: 1.6rem; }
            .pos { font-size: 1.2rem; width: 35px; }
            .photo-frame { width: 55px; height: 55px; margin: 0 12px; }
            .info h3 { font-size: 1.1rem; }
            .goals-count { padding: 8px; min-width: 65px; font-size: 1.2rem; }
            .admin-panel { padding: 15px; }
            .admin-table th:nth-child(3), .admin-table td:nth-child(3) { display: none; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <button class="admin-trigger" id="btnAdminAccess" onclick="solicitarAcesso()">
        <i class="fas fa-lock"></i> PAINEL ADM
    </button>

    <header>
        <h1>Artilheiro da Temporada</h1>
        <p>OLHO NO LANCE</p>
    </header>

    <div class="container">
        
        <!-- VISÃO DO CLIENTE -->
        <div id="painelCliente">
            <div class="ranking-list" id="rankingList">
                <p style="text-align: center; opacity: 0.5;">Carregando craques...</p>
            </div>
        </div>

        <!-- VISÃO DO ADMINISTRADOR -->
        <div id="painelAdmin" class="admin-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin:0">Gestão de Artilheiros</h2>
                <button class="btn btn-del btn-sm" onclick="sairAdmin()">Sair do Painel</button>
            </div>
            
            <div class="form-box">
                <h3 style="margin-top:0">Cadastrar Jogador</h3>
                <div class="form-group">
                    <label>Nome do Atleta</label>
                    <input type="text" id="cadNome" placeholder="Ex: Ronaldinho">
                </div>
                <div class="form-group">
                    <label>Equipe</label>
                    <input type="text" id="cadEquipe" placeholder="Ex: Grêmio">
                </div>
                <div class="form-group">
                    <label>Foto (Redimensionada Automaticamente)</label>
                    <input type="file" id="cadFoto" accept="image/*">
                </div>
                <button class="btn btn-add" onclick="processarESalvar()">SALVAR NO RANKING</button>
            </div>

            <div style="overflow-x: auto;">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Foto</th>
                            <th>Nome / Equipe</th>
                            <th>Gols</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL DE VÍDEOS -->
    <div id="modalGols" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="fecharModal()">&times;</span>
            <i class="fas fa-video" style="color: var(--accent); font-size: 2rem; margin-bottom: 10px;"></i>
            <h2 style="font-family: 'Orbitron'; color: var(--white);" id="modalPlayerName">Gols do Craque</h2>
            <div id="linksContainer" style="margin-top: 20px;"></div>
        </div>
    </div>

    <script>
        // CHAVE DE SEGURANÇA INTERNA (Altere aqui e nas Regras do Firebase se desejar)
        const CHAVE_INTERNA = "mudar_essa_senha_123";

        // 1. CONFIGURAÇÃO FIREBASE (Ranking Gols)
        const firebaseConfig = {
            databaseURL: "https://ranking-gols-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. ESCUTA EM TEMPO REAL
        db.ref('jogadores').on('value', snapshot => {
            const data = snapshot.val();
            const jogadores = [];
            for (let id in data) {
                jogadores.push({ id, ...data[id] });
            }

            // Ordenação decrescente de gols
            jogadores.sort((a, b) => b.gols - a.gols);

            atualizarInterfaceCliente(jogadores);
            atualizarInterfaceAdmin(jogadores);
        });

        // 3. FUNÇÕES DO CLIENTE
        function atualizarInterfaceCliente(lista) {
            const container = document.getElementById('rankingList');
            container.innerHTML = '';

            if (lista.length === 0) {
                container.innerHTML = '<p style="text-align:center; opacity:0.5;">Nenhum jogador cadastrado.</p>';
                return;
            }

            lista.forEach((atleta, i) => {
                const card = document.createElement('div');
                card.className = 'player-card';
                card.onclick = () => abrirGaleriaGols(atleta.nome, atleta.links);
                card.innerHTML = `
                    <div class="pos">${i + 1}º</div>
                    <div class="photo-frame"><img src="${atleta.foto}"></div>
                    <div class="info">
                        <h3>${atleta.nome}</h3>
                        <p>${atleta.equipe}</p>
                    </div>
                    <div class="goals-count">${atleta.gols}<span>GOLS</span></div>
                `;
                container.appendChild(card);
            });
        }

        // 4. FUNÇÕES DO ADMIN (Salvamento, Edição e Exclusão)
        async function processarESalvar() {
            const nome = document.getElementById('cadNome').value.trim();
            const equipe = document.getElementById('cadEquipe').value.trim();
            const fotoInput = document.getElementById('cadFoto');

            if (!nome || !equipe) return Swal.fire('Erro', 'Nome e Equipe são obrigatórios', 'error');

            Swal.fire({ title: 'Enviando ao Banco...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });

            let fotoFinal = "https://via.placeholder.com/150?text=Sem+Foto";
            if (fotoInput.files[0]) {
                fotoFinal = await comprimirImagem(fotoInput.files[0]);
            }

            db.ref('jogadores').push({
                nome: nome,
                equipe: equipe,
                foto: fotoFinal,
                gols: 0,
                links: [],
                chave_seguranca: CHAVE_INTERNA
            }).then(() => {
                Swal.fire('Sucesso!', 'Jogador adicionado ao ranking.', 'success');
                document.getElementById('cadNome').value = '';
                document.getElementById('cadEquipe').value = '';
                document.getElementById('cadFoto').value = '';
            }).catch((error) => {
                Swal.fire('Erro', 'Permissão negada pelo Firebase. Verifique suas regras!', 'error');
            });
        }

        function atualizarInterfaceAdmin(lista) {
            const tbody = document.getElementById('adminTableBody');
            if (!tbody) return;
            tbody.innerHTML = '';

            lista.forEach(atleta => {
                // Lista compacta de vídeos do atleta com opção de apagar individualmente
                let linksHTML = '';
                if (atleta.links && atleta.links.length > 0) {
                    linksHTML = '<div style="margin-top:5px; font-size:0.8rem; display:flex; flex-direction:column; gap:4px;">';
                    atleta.links.forEach((url, index) => {
                        linksHTML += `
                            <div style="display:flex; justify-content:space-between; align-items:center; background:#f0f0f0; padding:3px 6px; border-radius:4px; max-width:200px;">
                                <a href="${url}" target="_blank" style="color:#3498db; text-decoration:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:140px;">Gol #${index+1}</a>
                                <i class="fas fa-times" style="color:#e74c3c; cursor:pointer;" onclick="removerLinkVideo('${atleta.id}', ${index})" title="Remover este vídeo"></i>
                            </div>`;
                    });
                    linksHTML += '</div>';
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><img src="${atleta.foto}"></td>
                    <td>
                        <strong>${atleta.nome}</strong><br><small>${atleta.equipe}</small>
                        ${linksHTML}
                    </td>
                    <td>
                        <button class="btn btn-plus btn-sm" onclick="modificarGols('${atleta.id}', 1)">+</button>
                        <strong style="margin: 0 8px; font-size: 1.1rem">${atleta.gols}</strong>
                        <button class="btn btn-minus btn-sm" onclick="modificarGols('${atleta.id}', -1)">-</button>
                    </td>
                    <td>
                        <button class="btn btn-link btn-sm" onclick="addVideo('${atleta.id}')" title="Adicionar Link do Vídeo"><i class="fas fa-video"></i></button>
                        <button class="btn btn-del btn-sm" onclick="removerAtleta('${atleta.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function modificarGols(id, valor) {
            const atletaRef = db.ref('jogadores/' + id);
            atletaRef.once('value', snapshot => {
                const atleta = snapshot.val();
                if (atleta) {
                    const novosGols = Math.max(0, (atleta.gols || 0) + valor);
                    atletaRef.update({
                        gols: novosGols,
                        chave_seguranca: CHAVE_INTERNA
                    });
                }
            });
        }

        function removerAtleta(id) {
            Swal.fire({
                title: 'Excluir Atleta?',
                text: "Esta ação não pode ser desfeita!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Sim, apagar',
                confirmButtonColor: '#e74c3c'
            }).then(r => { 
                if (r.isConfirmed) {
                    db.ref('jogadores/' + id).remove(); 
                }
            });
        }

        function addVideo(id) {
            Swal.fire({
                title: 'Link do Vídeo do Gol',
                input: 'url',
                inputPlaceholder: 'https://youtube.com/shorts/...',
                showCancelButton: true,
                confirmButtonText: 'Salvar Link'
            }).then((result) => {
                if (result.value) {
                    const ref = db.ref('jogadores/' + id);
                    ref.once('value', s => {
                        const atleta = s.val();
                        if (atleta) {
                            const links = atleta.links || [];
                            links.push(result.value);
                            ref.update({
                                links: links,
                                chave_seguranca: CHAVE_INTERNA
                            }).then(() => {
                                Swal.fire('Vídeo Adicionado!', '', 'success');
                            });
                        }
                    });
                }
            });
        }

        function removerLinkVideo(id, index) {
            Swal.fire({
                title: 'Remover este vídeo do gol?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Sim, remover',
                confirmButtonColor: '#e74c3c'
            }).then(r => {
                if (r.isConfirmed) {
                    const ref = db.ref('jogadores/' + id);
                    ref.once('value', s => {
                        const atleta = s.val();
                        if (atleta) {
                            const links = atleta.links || [];
                            links.splice(index, 1);
                            ref.update({
                                links: links,
                                chave_seguranca: CHAVE_INTERNA
                            }).then(() => {
                                Swal.fire('Removido!', 'O link foi retirado.', 'success');
                            });
                        }
                    });
                }
            });
        }

        // 5. UTILITÁRIOS (Compressão, Modais e Telas)
        function comprimirImagem(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const size = 200; 
                        canvas.width = size;
                        canvas.height = size;
                        ctx.drawImage(img, 0, 0, size, size);
                        resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                    };
                };
            });
        }

        function abrirGaleriaGols(nome, links) {
            const container = document.getElementById('linksContainer');
            document.getElementById('modalPlayerName').innerText = nome;
            container.innerHTML = '';
            if (!links || links.length === 0) {
                container.innerHTML = '<p style="color:#888">Nenhum vídeo registrado para este atleta.</p>';
            } else {
                links.forEach((url, i) => {
                    container.innerHTML += `<a href="${url}" target="_blank" class="video-link"><i class="fab fa-youtube"></i> ASSISTIR GOL #${i + 1}</a>`;
                });
            }
            document.getElementById('modalGols').style.display = 'flex';
        }

        function fecharModal() { document.getElementById('modalGols').style.display = 'none'; }

        function solicitarAcesso() {
            Swal.fire({
                title: 'Login Administrativo',
                html: `<input type="text" id="user" class="swal2-input" placeholder="Usuário">
                       <input type="password" id="pass" class="swal2-input" placeholder="Senha">`,
                preConfirm: () => {
                    const u = document.getElementById('user').value;
                    const p = document.getElementById('pass').value;
                    if (u === 'admin' && p === '123456') return true;
                    Swal.showValidationMessage('Acesso negado!');
                }
            }).then(r => {
                if (r.isConfirmed) {
                    document.getElementById('painelCliente').classList.add('hidden');
                    document.getElementById('painelAdmin').style.display = 'block';
                    document.getElementById('btnAdminAccess').classList.add('hidden');
                }
            });
        }

        function sairAdmin() { location.reload(); }

        // Fechar modal ao clicar fora dele
        window.onclick = (e) => { if (e.target == document.getElementById('modalGols')) fecharModal(); }
    </script>
</body>
</html>
